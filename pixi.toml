[workspace]
authors = ["Jeroen van Bemmel <jvb127@gmail.com>"]
channels = ["conda-forge", "https://repo.prefix.dev/modular", "https://conda.modular.com/max", "https://conda.modular.com/max-nightly", "https://repo.prefix.dev/modular-community"]
name = "xYang.mojo"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
# Run all Mojo tests with module imports resolved from the repo root.
tests = "mojo -I . tests/test_ast_deserialize.mojo tests/test_validator.mojo tests/yang/test_must_expression.mojo tests/crash/test.mojo"

crash_test = "mojo -I . tests/crash/test.mojo"

yang_tests = "mojo -I . tests/yang/*.mojo"  # To run: pixi run yang_tests

basic-yang-example = "mojo -I . examples/basic_yang/main.mojo"
[dependencies]
mblack = "==26.2.0"
mojo = "0.26.2.0.*"
emberjson = ">=0.3.1,<0.4"
