[workspace]
authors = ["Jeroen van Bemmel <jvb127@gmail.com>"]
channels = ["https://conda.modular.com/max-nightly", "conda-forge"]
name = "xYang.mojo"
platforms = ["linux-64"]
version = "0.1.0"

[dependencies]
mblack = ">=26.2.0"
mojo = ">=1.0.0b2.dev2026050106,<2"
python = ">=3.11"

[tasks.build-lib]
cmd = "mojo package xyang -o build/xyang.mojopkg"
inputs = ["xyang/**/*.mojo"]
outputs = ["build/xyang.mojopkg"]

# Build an `xyang` CLI binary linked against `build/xyang.mojopkg`.
[tasks.build-xyang-bin]
depends-on = ["build-lib"]
cmd = "bash -lc 'M=\"$PWD/.pixi/envs/default/lib/mojo\"; mojo build -I build -I \"$M\" -o build/xyang main.mojo'"
inputs = ["main.mojo", "build/xyang.mojopkg"]
outputs = ["build/xyang"]

[tasks]
# Compile `xyang/` into `build/xyang.mojopkg`. Run this after changing sources under `xyang/`, then use `compile-check` or a targeted `mojo` command with `-I build` — faster than re-elaborating the full source tree.
package = "bash -lc 'mkdir -p build && export MODULAR_MOJO_IMPORT_PATH=\"$PWD/.pixi/envs/default/lib/mojo\" && mojo package -I. -o build/xyang.mojopkg xyang'"

# Fast feedback: one small test binary against the prebuilt package (no full source compile). Run `package` when `xyang/` changed.
compile-check = "bash -lc 'M=\"$PWD/.pixi/envs/default/lib/mojo\"; test -f build/xyang.mojopkg || { echo \"Run: pixi run package\"; exit 1; }; mojo -I build -I \"$M\" tests/test_basic_yang_validator.mojo'"

# Full test pass using `xyang` from `build/xyang.mojopkg`.
tests-mojopkg = "bash -lc 'set -e; M=\"$PWD/.pixi/envs/default/lib/mojo\"; test -f build/xyang.mojopkg || { echo \"Run: pixi run package\"; exit 1; }; for f in tests/test_basic_yang_validator.mojo tests/test_yang_json_construct.mojo tests/yang/cardinality.mojo tests/yang/leafref.mojo tests/yang/qname_test.mojo tests/yang/xpath/test_path_parser.mojo tests/yang/xpath/test_evaluator.mojo tests/yang/xpath/test_pratt_parser.mojo tests/yang/xpath/test_must_expression.mojo tests/yang/xpath/test_xpath_expression_argument.mojo; do echo \"== $f\"; mojo -I build -I \"$M\" \"$f\"; done'"

# Rebuilds and runs selected tests from **source** (`-I .`) — slower; use when validating changes that are not in the published `.mojopkg` yet, or to compare with mojopkg.
# Mojo 0.26+ rejects multiple entry `.mojo` paths in one invocation; run each file separately.
tests = "bash -lc 'set -e; M=\"$PWD/.pixi/envs/default/lib/mojo\"; for f in tests/test_basic_yang_validator.mojo tests/test_yang_json_construct.mojo tests/yang/cardinality.mojo tests/yang/leafref.mojo tests/yang/qname_test.mojo tests/yang/xpath/test_path_parser.mojo tests/yang/xpath/test_evaluator.mojo tests/yang/xpath/test_pratt_parser.mojo tests/yang/xpath/test_must_expression.mojo tests/yang/xpath/test_xpath_expression_argument.mojo; do echo \"== $f\"; mojo -I . -I \"$M\" \"$f\"; done'"

basic-yang-example = "mojo -I . -I examples examples/basic_yang/validator.mojo"

# CLI (same commands as Python `xyang`: parse, validate, convert). Example: `pixi run xyang -- parse file.yang`
[tasks.xyang]
depends-on = ["build-xyang-bin"]
cmd = "build/xyang"

[tasks.convert]
depends-on = ["build-xyang-bin"]
cmd = "build/xyang convert examples/meta-model/meta-model.yang -o examples/meta-model/meta-model.yang.json"

[tasks.openrouter-demo]
depends-on = ["package"]
cmd = "bash -lc 'M=\"$PWD/.pixi/envs/default/lib/mojo\"; mojo -I examples/openrouter_demo -I build -I \"$M\" examples/openrouter_demo/demo.mojo'"
